# Local development Postgres for the NoLimit Training migration.
# Start:  docker compose up -d
# Stop:   docker compose down        (data persists in the named volume)
# Wipe:   docker compose down -v     (deletes all local data)
#
# Connection string (put in .env as DATABASE_URL):
#   postgres://nolimit:nolimit_dev@localhost:5432/nolimit
#
# Adminer DB browser: http://localhost:8080  (System: PostgreSQL, Server: postgres)
services:
  postgres:
    image: postgres:16
    container_name: nolimit-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: nolimit
      POSTGRES_PASSWORD: nolimit_dev
      POSTGRES_DB: nolimit
    ports:
      - "5432:5432"
    volumes:
      - nolimit_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nolimit -d nolimit"]
      interval: 5s
      timeout: 3s
      retries: 10

  adminer:
    image: adminer
    container_name: nolimit-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  nolimit_pgdata:
